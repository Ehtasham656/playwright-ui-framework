name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository (Upgraded to v6 to support Node 24)
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2. Setup Node.js (Upgraded to v6 to support Node 24)
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5. Run tests
      - name: Run Playwright tests
        run: npx playwright test

      # 6. Upload HTML report (Upgraded to v5 to support Node 24)
      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      # 7. Upload traces (Upgraded to v5 to support Node 24)
      - name: Upload Playwright traces
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
